<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Commands - Horizon RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['Orbitron', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        code: ['"JetBrains Mono"', 'monospace']
                    },
                    colors: {
                        brand: {
                            navy: '#0c142c',
                            navydark: '#050a17',
                            gold: '#f4b41a',
                            goldlight: '#ffcd4d',
                            green: '#80d638',
                            greendark: '#57991f'
                        }
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050a17;
            color: #e2e8f0;
            /* Subtle tech grid background */
            background-image:
                linear-gradient(rgba(244, 180, 26, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(244, 180, 26, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
            background-attachment: fixed;
        }

        h1,
        h2,
        h3,
        h4,
        .font-heading {
            font-family: 'Russo One', sans-serif;
            letter-spacing: 0.05em;
        }

        .font-code {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050a17;
        }

        ::-webkit-scrollbar-thumb {
            background: #f4b41a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffcd4d;
        }

        /* Premium Glassmorphism */
        .glass-panel {
            background: rgba(12, 20, 44, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .text-glow-gold {
            text-shadow: 0 0 15px rgba(244, 180, 26, 0.6);
        }

        /* --- Advanced Animations --- */
        @keyframes glitch {

            2%,
            64% {
                transform: translate(2px, 0) skew(0deg);
            }

            4%,
            60% {
                transform: translate(-2px, 0) skew(0deg);
            }

            62% {
                transform: translate(0, 0) skew(5deg);
            }
        }

        .glitch-text {
            animation: glitch 1.5s linear infinite;
            position: relative;
        }

        .glitch-text:before,
        .glitch-text:after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
        }

        .glitch-text:before {
            left: 2px;
            text-shadow: -2px 0 theme('colors.brand.gold');
            animation: glitch-anim-2 2s linear infinite reverse;
        }

        .glitch-text:after {
            left: -2px;
            text-shadow: -2px 0 theme('colors.brand.green'), 2px 2px theme('colors.brand.gold');
            animation: glitch-anim-1 2.5s linear infinite reverse;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip: rect(42px, 9999px, 44px, 0);
            }

            10% {
                clip: rect(12px, 9999px, 60px, 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip: rect(2px, 9999px, 90px, 0);
            }

            10% {
                clip: rect(40px, 9999px, 40px, 0);
            }
        }

        /* Animated Border for Active Tabs */
        .tab-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: theme('colors.brand.gold');
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: rgba(244, 180, 26, 0.1);
            border-color: rgba(244, 180, 26, 0.3);
            color: theme('colors.brand.gold');
        }

        .tab-btn.active::before,
        .tab-btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Command Card Reveal */
        .command-row {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .command-row:hover {
            background-color: rgba(255, 255, 255, 0.03);
            border-color: rgba(244, 180, 26, 0.2);
        }

        /* Mouse Glow */
        #cursor-glow {
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            filter: blur(80px);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(244, 180, 26, 0.15), transparent 60%);
            z-index: 0;
        }
    </style>
</head>

<body class="selection:bg-brand-gold selection:text-brand-navy min-h-screen flex flex-col">

    <div id="cursor-glow"></div>

    <!-- Navigation -->
    <header class="fixed top-0 left-0 right-0 z-50 glass-panel border-b border-[#D4AF37]/20">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="window.location.href='index.html'">
                <img src="asset/horizon.png" alt="Horizon RP Logo"
                    class="h-20 w-auto transition-transform duration-300 group-hover:scale-110">
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a class="text-sm font-medium text-[#F5D77A]/80 hover:text-[#7CFF00] hover:shadow-[0_2px_0_0_#7CFF00] transition-all pb-1"
                    href="index.html">Home</a>
                <a class="text-sm font-medium text-[#F5D77A]/80 hover:text-[#7CFF00] hover:shadow-[0_2px_0_0_#7CFF00] transition-all pb-1"
                    href="index.html#about">Features</a>
                <a class="text-sm font-medium text-[#F5D77A]/80 hover:text-[#7CFF00] hover:shadow-[0_2px_0_0_#7CFF00] transition-all pb-1"
                    href="rules.html">Rules</a>
                <a class="text-sm font-medium text-[#7CFF00] border-b-2 border-[#7CFF00] transition-all pb-1"
                    href="commands.html">Commands</a>
                <a class="text-sm font-medium text-[#F5D77A]/80 hover:text-[#7CFF00] hover:shadow-[0_2px_0_0_#7CFF00] transition-all pb-1"
                    href="https://discord.gg/dGEu7GQv" target="_blank">Discord</a>
            </div>
            <button id="play-now-header"
                class="hidden md:flex bg-gradient-green text-black text-sm font-bold py-2.5 px-6 rounded-lg transition-all btn-green-glow items-center gap-2 group hover:scale-105">
                <span
                    class="material-symbols-outlined group-hover:translate-x-1 transition-transform text-[20px]">play_arrow</span>
                Play Now
            </button>
            <button id="mobile-menu-btn" class="md:hidden text-primary p-2 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-3xl font-bold">menu</span>
            </button>
        </div>
    </header>

    <!-- Standardized Mobile Menu Overlay -->
    <div id="mobile-menu-overlay"
        class="fixed inset-0 z-[100] bg-background-dark/98 backdrop-blur-2xl translate-x-full transition-transform duration-500 ease-in-out md:hidden flex flex-col items-center justify-center">
        <button id="mobile-menu-close"
            class="absolute top-8 right-8 text-primary p-2 hover:scale-110 transition-transform">
            <span class="material-symbols-outlined text-5xl font-bold">close</span>
        </button>

        <div class="flex flex-col space-y-10 text-center items-center w-full px-6">
            <a href="index.html"
                class="text-3xl font-display font-black text-white tracking-[0.2em] uppercase transition-all hover:scale-110 hover:text-primary">Home</a>
            <a href="index.html#about"
                class="text-3xl font-display font-black text-white tracking-[0.2em] uppercase transition-all hover:scale-110 hover:text-primary">Features</a>
            <a href="rules.html"
                class="text-3xl font-display font-black text-white tracking-[0.2em] uppercase transition-all hover:scale-110 hover:text-primary">Rules</a>
            <a href="commands.html"
                class="text-3xl font-display font-black text-primary tracking-[0.2em] uppercase transition-all hover:scale-110">Commands</a>
            <a href="https://discord.gg/dGEu7GQv" target="_blank"
                class="text-3xl font-display font-black text-white tracking-[0.2em] uppercase transition-all hover:scale-110 hover:text-primary">Discord</a>

            <div class="pt-12 w-full max-w-xs">
                <button id="mobile-play-now"
                    class="w-full bg-[#7CFF00] text-black font-black py-5 px-10 rounded-2xl shadow-[0_0_30px_rgba(124,255,0,0.4)] flex items-center justify-center gap-3 text-xl tracking-tighter hover:scale-105 transition-transform uppercase">
                    <span class="material-symbols-outlined text-3xl">play_arrow</span>
                    PLAY NOW
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-6 py-12 md:py-20 relative z-10">

        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="glitch-text text-5xl md:text-7xl font-heading text-white text-glow-gold uppercase"
                data-text="SYSTEM COMMANDS">SYSTEM COMMANDS</h1>
            <p class="text-xl text-brand-green mt-4 tracking-widest uppercase font-semibold">Technical Documentation</p>
            <div class="w-24 h-1 bg-gradient-to-r from-brand-gold to-brand-green mx-auto mt-6 rounded-full opacity-70">
            </div>
        </div>

        <div
            class="glass-panel rounded-2xl p-6 md:p-10 border-t-2 border-t-brand-gold/50 shadow-[0_20px_50px_rgba(0,0,0,0.4)]">

            <!-- Category Tabs -->
            <div class="flex flex-wrap justify-center gap-3 mb-10 text-sm md:text-base">
                <button class="tab-btn active px-6 py-3 rounded-lg font-heading tracking-wide text-white uppercase"
                    data-tab="general">General</button>
                <button class="tab-btn px-6 py-3 rounded-lg font-heading tracking-wide text-gray-400 uppercase"
                    data-tab="police">Police Dept</button>
                <button class="tab-btn px-6 py-3 rounded-lg font-heading tracking-wide text-gray-400 uppercase"
                    data-tab="ems">Paramedics</button>
                <button class="tab-btn px-6 py-3 rounded-lg font-heading tracking-wide text-gray-400 uppercase"
                    data-tab="mechanic">Mechanics</button>
                <button class="tab-btn px-6 py-3 rounded-lg font-heading tracking-wide text-gray-400 uppercase"
                    data-tab="government">Government</button>
                <button class="tab-btn px-6 py-3 rounded-lg font-heading tracking-wide text-gray-400 uppercase"
                    data-tab="efcc">EFCC</button>
                <button class="tab-btn px-6 py-3 rounded-lg font-heading tracking-wide text-gray-400 uppercase"
                    data-tab="restaurant">Restaurant</button>
            </div>

            <!-- Command List Container -->
            <div class="bg-brand-navydark/80 rounded-xl border border-white/5 p-4 md:p-6 min-h-[400px]">
                <!-- Column Headers -->
                <div
                    class="hidden md:grid grid-cols-12 gap-4 pb-4 border-b border-white/10 text-xs font-bold text-gray-500 uppercase tracking-widest px-4">
                    <div class="col-span-4">Syntax</div>
                    <div class="col-span-8">Description</div>
                </div>

                <div id="command-container" class="space-y-2 mt-4">
                    <!-- Dynamic Content Inserted Here -->
                </div>
            </div>

        </div>

        <!-- Footer Area within Main -->
        <div class="text-center text-gray-500 mt-16 pb-8 text-sm font-light">
            <p>&copy; 2026 Horizon RP. Engineered for Excellence.</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const commands = {
                general: [
                    { cmd: '/me [action]', desc: 'Perform a custom action visible to surrounding players.' },
                    { cmd: '/do [action]', desc: 'Describe an environmental effect, status, or RP sequence outcome.' },
                    { cmd: '/pay [id] [amount]', desc: 'Transfer cash securely to an adjacent citizen.' },
                    { cmd: '/showid [id]', desc: 'Present your government-issued identification.' },
                    { cmd: '/engine', desc: 'Toggle the ignition state of your current vehicle.' },
                    { cmd: '/lock', desc: 'Engage or disengage locks on your nearest owned vehicle.' },
                ],
                police: [
                    { cmd: '/m [message]', desc: 'Project your voice utilizing the patrol cruiser megaphone.' },
                    { cmd: '/r [message]', desc: 'Transmit a message via encrypted departmental radio frequencies.' },
                    { cmd: '/cuff [id]', desc: 'Restrain a compliant or subdued suspect with steel cuffs.' },
                    { cmd: '/ticket [id] [amt] [reason]', desc: 'Issue a formal citation for traffic or minor penal infractions.' },
                    { cmd: '/mdc', desc: 'Access the Mobile Data Computer for criminal records and warrants.' },
                ],
                ems: [
                    { cmd: '/r [message]', desc: 'Broadcast on the standardized emergency medical frequency.' },
                    { cmd: '/heal [id] [amount]', desc: 'Administer basic first aid to restore a patient\'s vitality.' },
                    { cmd: '/revive [id]', desc: 'Deploy a defibrillator to resuscitate an incapacitated individual.' },
                    { cmd: '/treatment [id]', desc: 'Perform a thorough diagnostic assessment of a patient.' },
                ],
                mechanic: [
                    { cmd: '/r [message]', desc: 'Communicate over the standard mechanic logistics channel.' },
                    { cmd: '/repair [id]', desc: 'Utilize tools to fix structural and engine vehicle damage.' },
                    { cmd: '/refuel [id]', desc: 'Replenish a vehicle\'s fuel reserves from a jerry can.' },
                    { cmd: '/tow', desc: 'Engage hydraulic winch to securely connect a disabled vehicle.' },
                ],
                government: [
                    { cmd: '/gov [message]', desc: 'Issue a legally binding statewide public service announcement.' },
                    { cmd: '/speech [message]', desc: 'Broadcast an oratorical address to all citizens in the immediate vicinity.' },
                ],
                efcc: [
                    { cmd: '/r [message]', desc: 'Transmit securely on the EFCC internal tactical frequency.' },
                    { cmd: '/seize [property]', desc: 'Confiscate assets linked to verified criminal enterprises.' },
                    { cmd: '/investigate [id]', desc: 'Initiate a formal audit and dossier on a suspected white-collar criminal.' },
                ],
                restaurant: [
                    { cmd: '/cook [item]', desc: 'Prepare an item listed on the establishment\'s culinary menu.' },
                    { cmd: '/serve [id]', desc: 'Deliver the prepared dish directly to a patron.' },
                    { cmd: '/bill [id] [amount]', desc: 'Generate and present a commercial invoice for services rendered.' },
                ]
            };

            const tabButtons = document.querySelectorAll('.tab-btn');
            const commandContainer = document.getElementById('command-container');

            const renderCommands = (category) => {
                commandContainer.innerHTML = '';
                const commandList = commands[category];

                if (commandList) {
                    commandList.forEach((command, index) => {
                        const row = document.createElement('div');
                        row.className = 'command-row grid grid-cols-1 md:grid-cols-12 gap-y-2 md:gap-x-4 items-center p-4 border border-transparent rounded-lg transition-colors';
                        row.style.animationDelay = `${index * 60}ms`;

                        row.innerHTML = `
                        <div class="col-span-12 md:col-span-4 flex items-center">
                            <code class="font-code text-brand-gold bg-brand-navydark border border-white/10 px-3 py-1.5 rounded-md text-sm shadow-inner group-hover:border-brand-gold/30 transition-colors w-full md:w-auto inline-block relative pl-6">
                                <span class="absolute left-2 text-gray-500 select-none">></span>
                                ${command.cmd}
                            </code>
                        </div>
                        <div class="col-span-12 md:col-span-8 flex items-center pr-2">
                            <p class="text-gray-300 font-light leading-relaxed">${command.desc}</p>
                        </div>
                    `;
                        commandContainer.appendChild(row);
                    });
                }
            };

            // Tab Switching Logic
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    tabButtons.forEach(btn => {
                        btn.classList.remove('active');
                        btn.classList.replace('text-white', 'text-gray-400');
                    });

                    button.classList.add('active');
                    button.classList.replace('text-gray-400', 'text-white');

                    renderCommands(button.dataset.tab);
                });
            });

            // Initialize First Tab
            renderCommands('general');

            // Mobile Menu Logic
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileOverlay = document.getElementById('mobile-menu-overlay');
            const mobileClose = document.getElementById('mobile-menu-close');
            const mobilePlay = document.getElementById('mobile-play-now');
            const headerPlay = document.getElementById('play-now-header');
            const serverIp = "play.horizon-rp.com";

            const openMenu = () => {
                if (mobileOverlay) mobileOverlay.classList.remove('translate-x-full');
                document.body.style.overflow = 'hidden';
            };

            const closeMenu = () => {
                if (mobileOverlay) mobileOverlay.classList.add('translate-x-full');
                document.body.style.overflow = '';
            };

            const copyIp = () => {
                navigator.clipboard.writeText(serverIp).then(() => {
                    alert('Horizon RP IP Copied: ' + serverIp);
                });
            };

            if (mobileBtn) mobileBtn.addEventListener('click', openMenu);
            if (mobileClose) mobileClose.addEventListener('click', closeMenu);
            if (headerPlay) headerPlay.addEventListener('click', copyIp);

            if (mobilePlay) {
                mobilePlay.addEventListener('click', () => {
                    closeMenu();
                    copyIp();
                });
            }

            // Ambient Mouse Glow Effect
            const cursorGlow = document.getElementById('cursor-glow');
            if (cursorGlow) {
                let requestRef;
                let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
                let currentX = mouseX, currentY = mouseY;

                const updateGlow = () => {
                    currentX += (mouseX - currentX) * 0.1;
                    currentY += (mouseY - currentY) * 0.1;
                    cursorGlow.style.left = currentX + 'px';
                    cursorGlow.style.top = currentY + 'px';
                    requestRef = requestAnimationFrame(updateGlow);
                };

                window.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                });

                requestRef = requestAnimationFrame(updateGlow);
            }
        });
    </script>
</body>

</html>
